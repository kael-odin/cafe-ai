# Configure Java toolchain for Android build
# This ensures compatibility even with Java 25 installed

android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

// Force Gradle to use Java 17 toolchain
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}
