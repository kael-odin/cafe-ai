name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Cancel in-progress runs for the same branch/tag
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: win
          - os: macos-latest
            platform: mac
            artifact: mac
          - os: ubuntu-latest
            platform: linux
            artifact: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare native binaries for all platforms
        run: npm run prepare:all

      - name: Build TypeScript
        run: npm run build

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/app/build/outputs/apk/release/*.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-android]
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find release-artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.apk" -o -name "*.blockmap" -o -name "latest*.yml" \) -exec cp {} release/ \;
          ls -la release/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cafe v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Cafe v${{ steps.get_version.outputs.VERSION }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `Cafe Setup ${{ steps.get_version.outputs.VERSION }}.exe` |
            | macOS (Intel) | `Cafe-${{ steps.get_version.outputs.VERSION }}-x64.dmg` |
            | macOS (Apple Silicon) | `Cafe-${{ steps.get_version.outputs.VERSION }}-arm64.dmg` |
            | Linux | `Cafe-${{ steps.get_version.outputs.VERSION }}.AppImage` |
            | Android | `Cafe-${{ steps.get_version.outputs.VERSION }}.apk` |

            ### What's Changed
            See [CHANGELOG.md](./CHANGELOG.md) for details.
          files: release/*
          draft: false
          prerelease: false
